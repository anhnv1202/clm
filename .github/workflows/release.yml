name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
          - os: macos-latest
            platform: macos-arm64
          - os: windows-latest
            platform: windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name clm clm
          chmod +x dist/clm

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name clm clm

      - uses: actions/upload-artifact@v4
        with:
          name: clm-${{ matrix.platform }}
          path: dist/clm*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Organize and checksum
        run: |
          mkdir -p release
          cp artifacts/clm-linux-x64/clm release/clm-linux-x64
          cp artifacts/clm-linux-arm64/clm release/clm-linux-arm64
          cp artifacts/clm-macos-arm64/clm release/clm-macos-arm64
          cp artifacts/clm-windows-x64/clm.exe release/clm-windows-x64.exe
          chmod +x release/clm-*
          cd release && sha256sum * > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
